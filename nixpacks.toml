# Railway (Nixpacks) — Node + Python juntos.
# Instala Python con pip incluido para los scripts (spawn python3).

[phases.setup]
nixPkgs = ['nodejs_20', 'python311', 'python311Packages.pip']

[phases.install]
cmds = [
  'npm ci',
  'python3 -m ensurepip --upgrade || true',
  'python3 -m pip install --break-system-packages -r requirements.txt'
]

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm run start'