# Railway usa Nixpacks para construir la app.
# Este archivo garantiza que Python 3 y sus librerías estén disponibles
# junto a Node.js, porque el sistema hace spawn('python3', ...).

[phases.setup]
nixPkgs = ['nodejs_20', 'python311', 'python311Packages.pip']

[phases.install]
cmds = [
  'npm ci',
  'python3 -m pip install --break-system-packages -r requirements.txt'
]

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm run start'